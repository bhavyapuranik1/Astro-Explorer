<script type="module">

import {

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  signInWithPopup,

  signOut,

  onAuthStateChanged

} from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {

  getFirestore,

  doc,

  setDoc,

  getDoc,

  collection,

  addDoc,

  getDocs

} from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

  apiKey:
    "AIzaSyAl2xGfbtQGHc6vlERCKZQFlMCA7dpR0qo",

  authDomain:
    "astronomy-project-f127f.firebaseapp.com",

  projectId:
    "astronomy-project-f127f",

  storageBucket:
    "astronomy-project-f127f.firebasestorage.app",

  messagingSenderId:
    "1011783382443",

  appId:
    "1:1011783382443:web:27d72789abfe1c924e8eee",

  measurementId:
    "G-DT6H2TC2VP"
};


const app =
  initializeApp(
    firebaseConfig
  );

  

const auth =
  getAuth(app);

const provider =
  new GoogleAuthProvider();

const db =
  getFirestore(app);

  let currentUser =
  null;


window.auth =
  auth;

window.provider =
  provider;

window.db =
  db;

window.signInWithPopup =
  signInWithPopup;

window.signOut =
  signOut;

window.onAuthStateChanged =
  onAuthStateChanged;

window.setDoc =
  setDoc;

window.getDoc =
  getDoc;

window.doc =
  doc;

window.collection =
  collection;

window.addDoc =
  addDoc;

window.getDocs =
  getDocs;

  window.currentUser = null;

  

window.saveChatMessage =
async function(sender, text) {

  if (!window.currentUser)
    return;

  try {

    const chatRef = doc(
      db,
      "users",
      window.currentUser.uid
    );

    const snap =
      await getDoc(chatRef);

    let oldChats = [];

    if (snap.exists()) {

      oldChats =
        snap.data().chatHistory || [];
    }

    oldChats.push({

      sender,
      text,

      time:
        new Date().toISOString()
    });

    await setDoc(chatRef, {

      chatHistory: oldChats

    }, { merge: true });

  }

  catch(err) {

    console.log(err);
  }
};


window.loadChatHistory =
async function() {

  if (!window.currentUser)
    return;

  try {

    const chatRef = doc(
      db,
      "users",
      window.currentUser.uid
    );

    const snap =
      await getDoc(chatRef);

    if (!snap.exists())
      return;

    const chats =
      snap.data().chatHistory || [];

    chats.forEach(chat => {

      addAIMessage(
        chat.text,
        chat.sender
      );
    });

  }

  catch(err) {

    console.log(err);
  }
};

  

  

</script>
